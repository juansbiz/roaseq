---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roaseq-pgdata
  namespace: roaseq
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: roaseq-postgres
  namespace: roaseq
spec:
  serviceName: roaseq-postgres
  replicas: 1
  selector:
    matchLabels:
      app: roaseq-postgres
  template:
    metadata:
      labels:
        app: roaseq-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: roaseq-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: roaseq-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: roaseq-secrets
              key: POSTGRES_DB
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: roaseq-postgres
  namespace: roaseq
spec:
  clusterIP: None
  selector:
    app: roaseq-postgres
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roaseq-redis
  namespace: roaseq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roaseq-redis
  template:
    metadata:
      labels:
        app: roaseq-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: roaseq-secrets
              key: REDIS_PASSWORD
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: roaseq-redis
  namespace: roaseq
spec:
  clusterIP: None
  selector:
    app: roaseq-redis
  ports:
  - port: 6379
