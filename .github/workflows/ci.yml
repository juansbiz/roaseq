name: CI

on:
  push:
    branches:
      - main
      - staging
      - releases
      - feat/*
      - ops
  pull_request:
    branches:
      - main
      - staging

jobs:
  setup-worktrees:
    runs-on: ubuntu-latest
    outputs:
      backend_ref: ${{ steps.refs.outputs.backend_ref }}
      frontend_ref: ${{ steps.refs.outputs.frontend_ref }}
    steps:
      - uses: actions/checkout@v4
      - id: refs
        run: |
          echo "backend_ref=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "frontend_ref=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-checkout
      - name: Setup frontend worktree
        run: |
          cd ${{ github.workspace }}/main-checkout
          git fetch origin refs/heads/feat/frontend:feat/frontend || true
          git worktree add .worktrunk/frontend feat/frontend || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main-checkout/.worktrunk/frontend/package-lock.json
      - run: npm ci
        working-directory: main-checkout/.worktrunk/frontend
      - run: npm run lint
        working-directory: main-checkout/.worktrunk/frontend
      - run: npm run ts:check
        working-directory: main-checkout/.worktrunk/frontend

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-checkout
      - name: Setup backend worktree
        run: |
          cd ${{ github.workspace }}/main-checkout
          git fetch origin refs/heads/feat/backend:feat/backend || true
          git worktree add .worktrunk/backend feat/backend || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main-checkout/.worktrunk/backend/package-lock.json
      - run: npm ci
        working-directory: main-checkout/.worktrunk/backend
      - run: npm run lint
        working-directory: main-checkout/.worktrunk/backend

  build:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-checkout
      - name: Setup worktrees for build
        run: |
          cd ${{ github.workspace }}/main-checkout
          git fetch origin refs/heads/feat/backend:feat/backend refs/heads/feat/frontend:feat/frontend refs/heads/ops:ops || true
          git worktree add .worktrunk/backend feat/backend || true
          git worktree add .worktrunk/frontend feat/frontend || true
          git worktree add .worktrunk/ops ops || true
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Extract branch name
        shell: bash
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/main-checkout
          push: true
          tags: |
            registry.antieq.com/roaseq:${{ env.BRANCH }}
            registry.antieq.com/roaseq:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/releases'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_DEV }}
      - name: Deploy to roaseq-dev
        run: |
          kubectl set image deployment/roaseq-app app registry.antieq.com/roaseq:staging -n roaseq-dev
          kubectl rollout status deployment/roaseq-app -n roaseq-dev --timeout=300s

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_PROD }}
      - name: Deploy to roaseq-prod
        run: |
          kubectl set image deployment/roaseq-app app registry.antieq.com/roaseq:latest -n roaseq-prod
          kubectl rollout status deployment/roaseq-app -n roaseq-prod --timeout=300s
