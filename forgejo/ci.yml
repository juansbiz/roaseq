name: CI

on:
  push:
    branches:
      - main
      - staging
      - releases
      - hotfix/*
  pull_request:
    branches:
      - main
      - staging

env:
  APP_NAME: roaseq
  REGISTRY: 100.111.250.71:5000
  # Per-branch images: registry/roaseq:staging, :releases, :main
  # Hetzner k3s registry is reachable via Tailscale from CI runners.

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .worktrunk/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .worktrunk/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run ts:check

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .worktrunk/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .worktrunk/backend/package-lock.json
      - run: npm ci
      - run: npm run ts:check

  build:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        run: |
          TAG=$(echo ${{ github.ref }} | sed 's/refs\/heads\///' | sed 's/\//-/g')
          echo "tags=${{ env.REGISTRY }}/${{ env.APP_NAME }}:$TAG" >> $GITHUB_OUTPUT
          echo "tags=${{ env.REGISTRY }}/${{ env.APP_NAME }}:latest" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Push to Hetzner registry (Tailscale)
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.APP_NAME }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
      - uses: azure/setup-kubectl@v4
      - name: Configure homelab kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > $KUBECONFIG
          chmod 600 $KUBECONFIG
      - name: Deploy to roaseq-staging
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.REGISTRY }}/${{ env.APP_NAME }}:staging -n roaseq-staging
          kubectl rollout status deployment/${{ env.APP_NAME }} -n roaseq-staging --timeout=300s

  deploy-releases:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/releases'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
      - uses: azure/setup-kubectl@v4
      - name: Configure homelab kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > $KUBECONFIG
          chmod 600 $KUBECONFIG
      - name: Deploy to roaseq-releases
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.REGISTRY }}/${{ env.APP_NAME }}:releases -n roaseq-releases
          kubectl rollout status deployment/${{ env.APP_NAME }} -n roaseq-releases --timeout=300s

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
      - uses: azure/setup-kubectl@v4
      - name: Configure Hetzner kubeconfig
        run: |
          echo "${{ secrets.VPS_KUBECONFIG }}" | base64 -d > $KUBECONFIG
          chmod 600 $KUBECONFIG
      - name: Deploy to Hetzner production
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.REGISTRY }}/${{ env.APP_NAME }}:main -n roaseq
          kubectl rollout status deployment/${{ env.APP_NAME }} -n roaseq --timeout=300s
