name: CI

on:
  push:
    branches: [staging, releases, main, hotfix/*]
  pull_request:
    branches: [staging, releases, main]

env:
  APP_NAME: roaseq
  REGISTRY: registry.antieq.com

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run ts:check

  build:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        run: |
          TAG=$(echo ${{ github.ref }} | sed 's/refs\/heads\///' | sed 's/\//-/g')
          echo "tags=${{ env.REGISTRY }}/${{ env.APP_NAME }}:$TAG" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        run: |
          docker build -t ${{ steps.meta.outputs.tags }} .
      - name: Push to registry
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker push ${{ steps.meta.outputs.tags }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.REGISTRY }}/${{ env.APP_NAME }}:staging -n ${{ env.APP_NAME }}-staging
          kubectl rollout status deployment/${{ env.APP_NAME }} -n ${{ env.APP_NAME }}-staging --timeout=300s

  deploy-releases:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/releases'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to releases
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.REGISTRY }}/${{ env.APP_NAME }}:releases -n ${{ env.APP_NAME }}-releases
          kubectl rollout status deployment/${{ env.APP_NAME }} -n ${{ env.APP_NAME }}-releases --timeout=300s

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.REGISTRY }}/${{ env.APP_NAME }}:latest -n ${{ env.APP_NAME }}
          kubectl rollout status deployment/${{ env.APP_NAME }} -n ${{ env.APP_NAME }} --timeout=300s
