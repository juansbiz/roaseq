  # Mautic — Traefik → Mautic (B2C CRM, k3s navena-mautic)
  # Canonical target per INFRASTRUCTURE-RULES.md §3.3. Must stay on this tunnel.
  - hostname: mautic.antieq.com
    service: https://[::1]:443
    originRequest:
      noTLSVerify: true

  # Mailcow — Hetzner mailcow webmail. The Hetzner VPS is the canonical
  # home for mailcow (per HETZNER-VPS-MISSION.md). The mailcow HTTPS
  # port (:18444) is only reachable inside the Hetzner host (docker-proxy
  # bound to 127.0.0.1) and not exposed to the public internet (Hetzner
  # cloud firewall blocks 18444). The cloudflared-business tunnel (which
  # runs on the homelab) cannot reach 167.233.22.167:18444 directly.
  # Solution: an SSH tunnel from homelab → Hetzner (mailcow-tunnel.service)
  # exposes mailcow 18444 on homelab 127.0.0.1:18444 over the Tailscale
  # SSH connection (which works reliably on port 22). cloudflared then
  # connects to the local 127.0.0.1:18444. The Host header is rewritten
  # to mail-relay.antieq.com (mailcow's nginx vhost). The cert on 18444
  # is Let's Encrypt for imap.antieq.com, so noTLSVerify is required.
  # History (2026-06-09): stub on :8093 → public IP 18444 (firewalled) →
  # SSH tunnel (permanent).
  - hostname: mail.antieq.com
    service: https://127.0.0.1:18444
    originRequest:
      noTLSVerify: true
      httpHostHeader: mail-relay.antieq.com

  # Traefik dashboard — 503 placeholder (dashboard returns 308 redirect loop)
  - hostname: traefik.antieq.com
    service: https://[::1]:443
    originRequest:
      noTLSVerify: true

  # Cal.diy — INBOXEQ scheduling (direct to caldiy container :3084)
  # 2026-06-08 deployment — see /opt/caldiy/ and 6. OPERATIONS/CAL-DIY-SETUP.md
  - hostname: cal.antieq.com
    service: http://127.0.0.1:3084

  # Ruby — Traefik → OutreachEQ (legacy alias for outeq.antieq.com).
  - hostname: dev.roaseq.com
    service: https://[::1]:443
    originRequest:
      noTLSVerify: true
  # Catch-all
  - service: http_status:404
