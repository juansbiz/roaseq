  # Other *.gotonedollar.com decommissioned subdomains (app/links/cal/webhook/
  # matrix/booking) had DNS records deleted 2026-06-08 PM.
  # See NAVENA_CODE/.worktrunk/ops/cloudflared.yml for the dev/staging/releases rules.
  #
  # Business-backends *.gotonedollar.com (NOT dev apps, NOT user-facing
  # customer apps — these are infrastructure backends like Mautic, Listmonk,
  # Twenty CRM, etc. that the business depends on):
  #   - newsletter.gotonedollar.com → Listmonk admin (homelab docker :9010)
  #     Routed via host Traefik per /etc/traefik/dynamic/community-stack.yml
  #     (newsletter-router → listmonk-service).
  #   - community.gotonedollar.com  → off-tunnel (Circle workspace, at Namecheap)
  # See INFRASTRUCTURE-RULES.md §1 for the rule.

  # Newsletter (Listmonk admin) — DTCEQ marketing backend
  - hostname: newsletter.gotonedollar.com
