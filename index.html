<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Route Preloading Strategy:
      - Critical vendor chunks are preloaded via Vite's built-in modulepreload
      - Additional route prefetching happens on sidebar hover via usePrefetch hook
      - This enables instant navigation by loading chunks before the user clicks
    -->

    <!-- Preload critical hero image for faster LCP -->
    <link
      rel="preload"
      as="image"
      href="/demo-screenshot-desktop.webp"
      type="image/webp"
      media="(min-width: 768px)"
    />
    <link
      rel="preload"
      as="image"
      href="/demo-screenshot-mobile.webp"
      type="image/webp"
      media="(max-width: 767px)"
    />

    <!-- Preload Inter font for body -->
    <link
      rel="preload"
      as="font"
      href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2"
      type="font/woff2"
      crossorigin
    />

    <!--
      ROASEQ TYPOGRAPHY BRANDING (ROASEQ Unified)
      =============================================
      - Body text: Inter
      - Headers: Bebas Neue (https://fonts.google.com/specimen/Bebas+Neue)
      - The Bebas Neue + Inter pairing is the ROASEQ unified system, mirrored from ROASEQ.
    -->

    <!-- Preload Bebas Neue for headers -->
    <link
      rel="preload"
      as="font"
      href="https://fonts.gstatic.com/s/bebasneue/v14/JTUSjIg69CK48gW7PXoo9Wlhyw.woff2"
      type="font/woff2"
      crossorigin
    />

    <!-- Inter font - CRITICAL (loads immediately for body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Bebas Neue font - Headers -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />

    <!--
      Premium display fonts - DEFERRED
      These only load after initial paint using the print-media trick.
    -->

    <!-- SEO Meta Tags -->
    <title>
      ROASEQ - Open-Source Ecommerce Attribution | FOSS Triple Whale Alternative
    </title>
    <meta
      name="title"
      content="ROASEQ - Open-Source Ecommerce Attribution | FOSS Triple Whale Alternative"
    />
    <meta
      name="description"
      content="ROASEQ is the open-source ecommerce attribution platform. The FOSS alternative to Triple Whale, Northbeam, and Hyros. Multi-touch attribution, channel ROI, journey stitching - in your own Postgres. Self-host free forever, or managed cloud from $39/mo. No percentage of ad spend. No 12-month contract. Your data, your models, your database."
    />
    <meta
      name="keywords"
      content="attribution, multi-touch attribution, ecommerce attribution, Triple Whale alternative, Hyros alternative, Northbeam alternative, FOSS attribution, open source attribution, self-hosted attribution, ROAS, MER, channel ROI, journey stitching, server-side events, data ownership, no vendor lock-in, AGPL, attribution platform"
    />
    <meta name="author" content="ROASEQ LLC" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#101010" />
    <meta name="msapplication-TileColor" content="#101010" />

    <!-- Theme-aware styles to prevent flash -->
    <style>
      /* System font fallback stack matching Inter metrics for minimal CLS */
      :root {
        --font-fallback:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      /* Set base font immediately to prevent FOIT */
      html {
        font-family: "Inter", var(--font-fallback);
      }

      /* Theme-aware backgrounds - light mode default */
      html,
      body,
      #root {
        background-color: #ffffff;
        color: #0a0a0a;
        transition:
          background-color 0.2s ease-out,
          color 0.2s ease-out;
      }

      /* Dark mode via system preference */
      @media (prefers-color-scheme: dark) {
        html,
        body,
        #root {
          background-color: #0a0a0a;
          color: #ffffff;
        }
      }

      /* Dark mode via class (when user has explicit preference) */
      html.dark,
      html.dark body,
      html.dark #root {
        background-color: #0a0a0a !important;
        color: #ffffff !important;
      }

      /* Light mode override when explicitly set */
      html.light,
      html.light body,
      html.light #root {
        background-color: #ffffff !important;
        color: #0a0a0a !important;
      }

      /* Header preload styles */
      .nav-preload {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: linear-gradient(
          to bottom,
          rgba(17, 24, 39, 0.95),
          rgba(17, 24, 39, 0.8),
          transparent
        );
        backdrop-filter: blur(16px);
        z-index: 50;
      }
    </style>

    <!-- Theme detection script (runs before React to prevent flash) -->
    <script>
      (function () {
        // Check localStorage for saved theme preference
        var savedTheme =
          localStorage.getItem("roaseq-theme") || localStorage.getItem("theme");

        if (savedTheme === "dark") {
          document.documentElement.classList.add("dark");
        } else if (savedTheme === "light") {
          document.documentElement.classList.add("light");
        }
        // If no saved preference, CSS media query handles system preference
      })();
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.roaseq.com" />
    <meta
      property="og:title"
      content="ROASEQ - Open-Source Ecommerce Attribution Platform"
    />
    <meta
      property="og:description"
      content="The FOSS alternative to Triple Whale, Northbeam, and Hyros. Multi-touch attribution, channel ROI, journey stitching - in your own Postgres. Self-host free, or cloud from $39/mo."
    />
    <meta
      property="og:image"
      content="https://www.roaseq.com/roaseq-og-image.jpg"
    />
    <meta
      property="og:image:alt"
      content="ROASEQ - Open-Source Ecommerce Attribution Platform"
    />
    <meta property="og:site_name" content="ROASEQ" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.roaseq.com" />
    <meta
      name="twitter:title"
      content="ROASEQ - Open-Source Ecommerce Attribution Platform"
    />
    <meta
      name="twitter:description"
      content="The FOSS alternative to Triple Whale, Northbeam, and Hyros. Multi-touch attribution, channel ROI, journey stitching. Self-host free, or cloud from $39/mo."
    />
    <meta
      name="twitter:image"
      content="https://www.roaseq.com/roaseq-twitter-image.jpg"
    />
    <meta
      name="twitter:image:alt"
      content="ROASEQ - All-in-One Business Platform"
    />
    <meta name="twitter:site" content="@roaseq" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.roaseq.com" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ROASEQ",
        "description": "Open-source ecommerce attribution platform. The FOSS alternative to Triple Whale, Northbeam, and Hyros. Multi-touch attribution, channel ROI, journey stitching - in your own Postgres. Self-host free forever, or managed cloud from $39/mo.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web, Docker, Linux",
        "offers": [
          {
            "@type": "Offer",
            "name": "Self-Hosted",
            "price": "0.00",
            "priceCurrency": "USD",
            "availability": "https://schema.org/InStock"
          },
          {
            "@type": "Offer",
            "name": "Cloud",
            "price": "39.00",
            "priceCurrency": "USD",
            "availability": "https://schema.org/InStock"
          }
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "reviewCount": "250"
        },
        "creator": {
          "@type": "Organization",
          "name": "ROASEQ",
          "url": "https://www.roaseq.com"
        }
      }
    </script>
  </head>
  <body>
    <!-- Header preload to prevent flash -->
    <div class="nav-preload" id="nav-preload"></div>
    <div id="root"></div>
    <script type="module" src="/frontend/main.jsx"></script>
    <script>
      // Remove preload immediately when React app mounts (no artificial delay)
      window.addEventListener("DOMContentLoaded", () => {
        const preload = document.getElementById("nav-preload");
        if (preload) {
          // Smooth fade out transition
          preload.style.transition = "opacity 150ms";
          preload.style.opacity = "0";
          setTimeout(() => preload.remove(), 150);
        }
      });
    </script>
  </body>
</html>
